
<ion-card class="ion-no-padding">
  @if (transactions.length > 0) {
    <!-- <ion-card-header>
      <ion-label>Busqueda y Filtros</ion-label>
    </ion-card-header> -->
    <ion-segment [value]="'all'"  (ionChange)="onTypeChange($event)">
      <ion-segment-button value="all">
        <ion-label>todas</ion-label>
      </ion-segment-button>
      <ion-segment-button value="Ingreso">
        <ion-label>ingreso</ion-label>
      </ion-segment-button>
      <ion-segment-button value="Gasto">
        <ion-label>gasto</ion-label>
      </ion-segment-button>
      <ion-segment-button value="Neutral">
        <ion-label>neutral</ion-label>
      </ion-segment-button>
    </ion-segment>

    <ion-select
    placeholder="Categoría"
    (ionChange)="onCategoryChange($event.detail.value)"
    >

    <ion-select-option value="Alimentación">Alimentación</ion-select-option>
    <ion-select-option value="Transporte">Transporte</ion-select-option>

    <ion-select-option value="Vivienda">Vivienda</ion-select-option>
    <ion-select-option value="Ocio">Ocio</ion-select-option>

    <ion-select-option value="Salario">Salario</ion-select-option>
    <ion-select-option value="Transporte">Transporte</ion-select-option>

    <ion-select-option value="Otros">Otros</ion-select-option>
  </ion-select>

  <ion-searchbar
  placeholder="Buscar descripción"
  (ionInput)="onSearch($event.target.value)"
  ></ion-searchbar>
} @else {
  <app-empty-state
    message="No hay transacciones registradas"
    action="dashboard"
    iconName="layer-outline"
    (onAction)="handleAction($event)"
  />
}
  <ion-card-content>
    @if (transactions.length > 0) {
      <ion-list>
        @for (transaction of filteredTransactions; track $index) {
          <app-transaction-item
            [transaction]="transaction"
            (onDetail)="onClickedItem($event)"
          />
        }
      </ion-list>
    }
  </ion-card-content>
</ion-card>
