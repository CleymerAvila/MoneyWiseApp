<ion-content scrollY="false">
  <ion-card>
    <ion-thumbnail>
      <img width="96" height="96" src="../../../../assets/buy-for-cash.png" alt="buy-for-cash"/>
    </ion-thumbnail>
    <ion-card-content>
      <ion-title>
        Welcome Back!
      </ion-title>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <ion-grid>
          <ion-row>
            <ion-col>
              <app-form-input
                label="Email"
                type="email"
                formControlName="email"
                ngDefaultControl
              >
            </app-form-input>
            @if (this.email.invalid && (this.email.dirty || this.email.touched)) {
              <ion-label color="danger">Email input format incorrect</ion-label>
            }
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <app-form-input
                label="Password"
                type="password"
                formControlName="password"
                ngDefaultControl
              >
              </app-form-input>
              @if (this.password.invalid && (this.password.dirty || this.password.touched)) {
                <ion-label color="danger">the minimin length character is 9 and the maximun 12</ion-label>
              }
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <ion-button type="submit" [disabled]="loginForm.invalid"
                >Log in</ion-button
              >
            </ion-col>
          </ion-row>
        </ion-grid>
      </form>
      <ion-row>
        <ion-col size="12">
          <ion-label>
            Don't have an account
            <a routerLink="/auth/register">sign up</a>
          </ion-label>
        </ion-col>
      </ion-row>
    </ion-card-content>
  </ion-card>
</ion-content>
