<ion-app>
  <ion-menu side="start" menuId="m1" contentId="main">
    <ion-header >
      <ion-toolbar>
        <ion-title>
          Menu
        </ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-justify-content-between">
      <ion-list>
        <ion-item button [routerLink]="['./dashboard']">
          <ion-label>Dashboard</ion-label>
        </ion-item>
        <ion-item button [routerLink]="['./transactions']">
          <ion-label>Transactions</ion-label>
        </ion-item>
        <ion-item button [routerLink]="['./statistics']">
          <ion-label>Statistics</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
    <ion-footer>
      <ion-button type="submit" (click)="authService.logout()">
        Logout
      </ion-button>
    </ion-footer>
  </ion-menu>
  <ion-router-outlet id="main">

  </ion-router-outlet>
  <ion-tabs>
    <ion-tab-bar slot="bottom">
      <ion-tab-button
        routerLink="./dashboard"
        routerLinkActive="tab-selected"
        >
        <ion-icon name="grid"></ion-icon>
        Dashboard
      </ion-tab-button>
      <ion-tab-button
        routerLink="./transactions"
        routerLinkActive="tab-selected">
        <ion-icon name="wallet"></ion-icon>
        Transactions
      </ion-tab-button>
      <ion-tab-button>
        <ion-icon name="bar-chart"></ion-icon>
        Statistics
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-app>
