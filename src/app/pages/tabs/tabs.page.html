<ion-app>
  <ion-menu side="start" menuId="m1" contentId="main">
    <ion-header>
      <ion-toolbar>
          <ion-avatar slot="start">
            <img src="https://pbs.twimg.com/profile_images/2042418472227926017/6MJKPl_R_400x400.jpg" alt="">
          </ion-avatar>
          <ion-title>
            {{ authService.currentUser?.fullName }}
          </ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-justify-content-between">
      <ion-list lines="none">
        <ion-item button [routerLink]="['./dashboard']">
          <ion-icon slot="start" name="grid"></ion-icon>
          Dashboard
        </ion-item>
        <ion-item button [routerLink]="['./transactions']">
          <ion-icon slot="start" name="wallet"></ion-icon>
          Transaction
        </ion-item>
        <ion-item button [routerLink]="['./statistics']">
          <ion-icon slot="start" name="bar-chart"></ion-icon>
          Statistics
        </ion-item>
      </ion-list>
    </ion-content>
    <ion-footer>
      <ion-button type="submit" (click)="authService.logout()">
        Logout
      </ion-button>
    </ion-footer>
  </ion-menu>
  <ion-router-outlet id="main">

  </ion-router-outlet>
  <ion-tabs>
    <ion-tab-bar slot="bottom">
      <ion-tab-button
        routerLink="./dashboard"
        routerLinkActive="tab-selected"
        >
        <ion-icon name="grid"></ion-icon>
        Dashboard
      </ion-tab-button>
      <ion-tab-button
        routerLink="./transactions"
        routerLinkActive="tab-selected">
        <ion-icon name="wallet"></ion-icon>
        Transactions
      </ion-tab-button>
      <ion-tab-button>
        <ion-icon name="bar-chart"></ion-icon>
        Statistics
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-app>
