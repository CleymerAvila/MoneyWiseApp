<ion-item-sliding>
<ion-item (click)="onClicked()">
  <div slot="start">
    <app-category-icon [category]="transaction.category" size="'small'">
    </app-category-icon>
  </div>

  <ion-label >
    <h2>
      <strong> {{ transaction.category }} </strong>
    </h2>
    <p>{{ transaction.type }}</p>
  </ion-label>

  <ion-label slot="end">
    <app-amount-display
      *ngIf="transaction"
      [amount]="transaction.amount"
      [type]="transaction.type.toLocaleLowerCase()"
      size="small"
    />
    <p style="text-align: end">{{ transaction.issueDate }}</p>

    <p style="text-align: end;"><ion-icon size="medium" [name]="!transaction.proofImage ? 'image' : 'alert-circle'"></ion-icon></p>
  </ion-label>
</ion-item>

<ion-item-options side="end">
    <ion-item-option [routerLink]="['../edit/', transaction.id]">
      <ion-icon  slot="icon-only" name="create"></ion-icon>
    </ion-item-option>
    <ion-item-option (click)="handleDelete()" color="danger">
      <ion-icon  slot="icon-only" name="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
