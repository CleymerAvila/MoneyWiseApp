<ion-item-sliding>
<ion-item (click)="onClicked()">
  <div slot="start">
    <app-category-icon [category]="transaction.category" size="'small'">
    </app-category-icon>
  </div>

  <div style="width: 100%;">
    <ion-label>
      <strong> {{ transaction.category }} </strong>
    </ion-label>
    <ion-label>{{ transaction.type }}</ion-label>
    <ion-note >{{ transaction.description }}</ion-note>
  </div>

  <ion-label slot="end">
    <app-amount-display
      *ngIf="transaction"
      [amount]="transaction.amount"
      [type]="transaction.type.toLocaleLowerCase()"
      size="small"
    />
    <p style="text-align: end">{{ transaction.issueDate  | relativeDate}}</p>

    <p style="text-align: end;">
      <ion-icon
        size="medium"
        [name]="transaction.proofImage ? 'image' : 'alert-circle'">
      </ion-icon>
    </p>
  </ion-label>
</ion-item>

<ion-item-options side="end">
    <ion-item-option [routerLink]="['../edit/', transaction.id]">
      <ion-icon  slot="icon-only" name="create"></ion-icon>
    </ion-item-option>
    <ion-item-option (click)="handleDelete()" color="danger">
      <ion-icon  slot="icon-only" name="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
